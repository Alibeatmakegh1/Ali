<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Create Account | Alibeatmaker</title>

    <link rel="stylesheet" href="../Register/Register.css">
    <link rel="stylesheet" href="../rate-limit/rate-limit.css">
</head>
<body>

<main>
    <div class="animated-bg"></div>

    <div class="theme-switch">
        <button id="themeBtn" class="toggle">
            <span class="toggle__icon">🌙</span>
        </button>
    </div>

    <form class="form" id="registerForm">
        <div class="form__cover"></div>

        <div class="form__content">
            <h1 class="form__title">
                <span class="title-char">R</span>
                <span class="title-char">E</span>
                <span class="title-char">G</span>
                <span class="title-char">I</span>
                <span class="title-char">S</span>
                <span class="title-char">T</span>
                <span class="title-char">E</span>
                <span class="title-char">R</span>
            </h1>

            <!-- Name Input -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="text" class="styled-input__input" id="regName" value="" required>
                    <label class="styled-input__label">Full Name</label>
                </div>
            </div>

            <!-- Email Input -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="email" class="styled-input__input" id="regEmail" value="" required>
                    <label class="styled-input__label">Email</label>
                </div>
            </div>

            <!-- Password Input -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="password" class="styled-input__input" id="regPassword" value="" required>
                    <label class="styled-input__label">Password</label>
                    <span class="eye-toggle" id="toggleRegPassword">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path class="eye-open" fill="none" stroke="currentColor" stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                            <circle class="eye-open" fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3"/>
                            <path class="eye-closed" fill="none" stroke="currentColor" stroke-width="2" d="M3.5 13c4-6 13-6 17 0"/>
                            <path class="eye-slash" fill="none" stroke="currentColor" stroke-width="2" d="M3 3c6 6 12 12 18 18"/>
                        </svg>
                    </span>
                </div>

                <!-- Password Requirements -->
                <div class="password-requirements" id="passwordRequirements">
                    <div class="req-item">
                        <span class="req-icon" id="req-length-icon">○</span>
                        <span class="req-text">At least 8 characters</span>
                    </div>
                    <div class="req-item">
                        <span class="req-icon" id="req-number-icon">○</span>
                        <span class="req-text">Contains numbers (0-9)</span>
                    </div>
                    <div class="req-item">
                        <span class="req-icon" id="req-letter-icon">○</span>
                        <span class="req-text">Contains letters (a-z)</span>
                    </div>
                    <div class="req-item optional">
                        <span class="req-icon" id="req-uppercase-icon">○</span>
                        <span class="req-text">Uppercase letter (A-Z)</span>
                    </div>
                    <div class="req-item optional">
                        <span class="req-icon" id="req-special-icon">○</span>
                        <span class="req-text">Special character (!@#...)</span>
                    </div>
                </div>

                <!-- Password Strength -->
                <div class="strength-container">
                    <div class="strength-bar-bg">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <span class="strength-text" id="strengthText"></span>
                </div>
            </div>

            <!-- Confirm Password Input -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="password" class="styled-input__input" id="regConfirmPassword" value="" required>
                    <label class="styled-input__label">Confirm Password</label>
                    <span class="eye-toggle" id="toggleRegConfirmPassword">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path class="eye-open" fill="none" stroke="currentColor" stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                            <circle class="eye-open" fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3"/>
                            <path class="eye-closed" fill="none" stroke="currentColor" stroke-width="2" d="M3.5 13c4-6 13-6 17 0"/>
                            <path class="eye-slash" fill="none" stroke="currentColor" stroke-width="2" d="M3 3c6 6 12 12 18 18"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- hCaptcha -->
            <div class="hcaptcha-wrapper">
                <div class="h-captcha" data-sitekey="0f50dd52-765a-4cd2-adc8-0784abc479c6"></div>
            </div>

            <!-- Error/Success Messages INSIDE FORM -->
            <p class="error-message" id="regErrorMsg"></p>
            <p class="success-message" id="regSuccessMsg"></p>

            <!-- Submit Button -->
            <button type="submit" class="submit-button" id="registerBtn">
                <span class="button-text">Create Account</span>
            </button>

            <!-- Back Link as Button -->
            <a href="../Login/Login.html" class="back-button">
                ← Back to Login
            </a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script src="../rate-limit/rate-limit.js"></script>
<script src="../Register/Register.js"></script>
<script src="../auth/auth.js"></script>

</body>
</html>
