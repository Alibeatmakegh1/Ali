<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Reset Password | Alibeatmaker</title>

    <link rel="stylesheet" href="../Reset-Password/Reset-Password.css">
    <link rel="stylesheet" href="../rate-limit/rate-limit.css">
</head>
<body>

<main>
    <div class="animated-bg"></div>

    <div class="theme-switch">
        <button id="themeBtn" class="toggle">
            <span class="toggle__icon">🌙</span>
        </button>
    </div>

    <form class="form" id="resetForm">
        <div class="form__cover"></div>

        <div class="form__content">
            <h1 class="form__title" id="hackTitle">
                <span class="title-char">R</span>
                <span class="title-char">E</span>
                <span class="title-char">S</span>
                <span class="title-char">E</span>
                <span class="title-char">T</span>
            </h1>

            <!-- Email Input -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="email" class="styled-input__input" id="resetEmail" required>
                    <label class="styled-input__label">Email</label>
                </div>
            </div>

            <!-- hCaptcha -->
            <div class="hcaptcha-wrapper">
                <div class="h-captcha" data-sitekey="0f50dd52-765a-4cd2-adc8-0784abc479c6"></div>
            </div>

            <!-- Messages -->
            <p class="error-message" id="resetErrorMsg"></p>
            <p class="success-message" id="resetSuccessMsg"></p>

            <!-- Submit Button -->
            <button type="button" class="submit-button" id="resetBtn">
                <span class="button-text">Send Reset Link</span>
            </button>

            <!-- Back Button -->
            <a href="../Login/Login.html" class="back-button">
                ← Back to Login
            </a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script src="../rate-limit/rate-limit.js"></script>
<script src="../Reset-Password/Reset-Password.js"></script>
<script src="../auth/auth.js"></script>

</body>
</html>
