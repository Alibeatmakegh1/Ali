<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>Change Password | Alibeatmaker</title>
    <link rel="stylesheet" href="change-password.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<main>
    <div class="animated-bg"></div>
    <canvas id="matrixCanvas"></canvas>

    <div class="theme-switch">
        <button id="themeBtn" class="toggle">
            <span class="toggle__icon">🌙</span>
        </button>
    </div>

    <form class="form" id="changePasswordForm">
        <div class="form__cover"></div>

        <div class="form__content">
            <h1 class="form__title">
                <span class="title-char">C</span>
                <span class="title-char">h</span>
                <span class="title-char">a</span>
                <span class="title-char">n</span>
                <span class="title-char">g</span>
                <span class="title-char">e</span>
                <span class="title-char">&nbsp;</span>
                <span class="title-char">P</span>
                <span class="title-char">a</span>
                <span class="title-char">s</span>
                <span class="title-char">s</span>
                <span class="title-char">w</span>
                <span class="title-char">o</span>
                <span class="title-char">r</span>
                <span class="title-char">d</span>
            </h1>

            <!-- New Password -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="password" class="styled-input__input" id="newPassword" value="" required>
                    <label class="styled-input__label">New Password</label>
                    <span class="eye-toggle" id="togglePassword1">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path class="eye-open" fill="none" stroke="currentColor" stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                            <circle class="eye-open" fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3"/>
                            <path class="eye-closed" fill="none" stroke="currentColor" stroke-width="2" d="M3.5 13c4-6 13-6 17 0"/>
                            <path class="eye-slash" fill="none" stroke="currentColor" stroke-width="2" d="M3 3c6 6 12 12 18 18"/>
                        </svg>
                    </span>
                </div>

                <!-- Password Requirements (Hidden by default) -->
                <div class="password-requirements" id="passwordRequirements">
                    <div class="req-item">
                        <span class="req-icon" id="req-length-icon">○</span>
                        <span class="req-text">At least 8 characters</span>
                    </div>
                    <div class="req-item">
                        <span class="req-icon" id="req-number-icon">○</span>
                        <span class="req-text">Contains numbers (0-9)</span>
                    </div>
                    <div class="req-item">
                        <span class="req-icon" id="req-letter-icon">○</span>
                        <span class="req-text">Contains letters (a-z)</span>
                    </div>
                    <div class="req-item optional">
                        <span class="req-icon" id="req-uppercase-icon">○</span>
                        <span class="req-text">Uppercase letter (A-Z)</span>
                    </div>
                    <div class="req-item optional">
                        <span class="req-icon" id="req-special-icon">○</span>
                        <span class="req-text">Special character (!@#...)</span>
                    </div>
                </div>

                <!-- Password Strength Indicator -->
                <div class="strength-container">
                    <div class="strength-bar-bg">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <span class="strength-text" id="strengthText"></span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="form__group">
                <div class="styled-input">
                    <input type="password" class="styled-input__input" id="confirmPassword" required>
                    <label class="styled-input__label">Confirm Password</label>
                    <span class="eye-toggle" id="togglePassword2">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                            <path class="eye-open" fill="none" stroke="currentColor" stroke-width="2" d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                            <circle class="eye-open" fill="none" stroke="currentColor" stroke-width="2" cx="12" cy="12" r="3"/>
                            <path class="eye-closed" fill="none" stroke="currentColor" stroke-width="2" d="M3.5 13c4-6 13-6 17 0"/>
                            <path class="eye-slash" fill="none" stroke="currentColor" stroke-width="2" d="M3 3c6 6 12 12 18 18"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- hCaptcha -->
            <div class="hcaptcha-wrapper">
                <div class="h-captcha" data-sitekey="0f50dd52-765a-4cd2-adc8-0784abc479c6"></div>
            </div>

            <!-- Messages -->
            <p class="error-message" id="errorMsg"></p>
            <p class="success-message" id="successMsg"></p>

            <!-- Submit Button -->
            <button type="submit" class="submit-button" id="submitBtn">
                <span class="button-text">Change Password</span>
                <span class="button-glow"></span>
            </button>

            <!-- Back Link as Button -->
            <a href="index.html" class="back-button">
                <span class="back-text">← Back to Login</span>
            </a>
        </div>
    </form>
</main>

<script src="https://js.hcaptcha.com/1/api.js" async defer></script>
<script src="change-password.js"></script>
</body>
</html>
